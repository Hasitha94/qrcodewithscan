<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Nature Villa Guest Info</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5, #d3cce3, #fbc2eb);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 450px;
}

/* Glass card */
.card {
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    background-color: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 0 1px rgba(255,255,255,0.3);
    color: #0f0f0f;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 0 2px rgba(255,255,255,0.4);
}

.card h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 15px;
}

.info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 17px;
}

.info i {
    font-size: 22px;
    color: #0b0b0b;
}

.card.clickable {
    cursor: pointer;
}

/* Dropdown menu */
.dropdown {
    margin-top: 10px;
    width: 100%;
}

.dropdown button {
    width: 100%;
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: #0b0b0b;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
}

.dropdown button:hover {
    background: rgba(255,255,255,0.3);
}

.dropdown-content {
    display: none;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    margin-top: 5px;
    overflow: hidden;
}

.dropdown-content li {
    list-style: none;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.dropdown-content li:last-child {
    border-bottom: none;
}

.show {
    display: block;
}

.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.logo h1 {
    margin-top: 10px;
    font-size: 22px;
    font-weight: 600;
    color: #0b0b0b;
}

/* QR Code styling */
.qr-code img {
    width: 140px;
    height: 140px;
    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    margin-top: 10px;
}

</style>
</head>
<body>

<div class="container">
    <!-- Logo -->
    <div class="logo">
        <img src="file.jpg" alt="Prime Nature Logo">
        <!-- <h1>Welcome</h1> -->
    </div>

    <!-- WiFi Card -->
    <div class="card">
        <h2><i class="fas fa-wifi"></i> WiFi Info</h2>
        <div class="info">
            <!-- <div>Network: <strong>VillaGuestWifi</strong></div> -->
            <div>Password: <strong>admin</strong></div>
        </div>
    </div>

    <!-- Location Card -->
    <a href="https://www.google.com/maps/place/Prime+Nature+Home+%26+Drive/@7.1966193,79.8767968,17z/data=!3m1!4b1!4m6!3m5!1s0x3ae2ef002606e7e5:0x93374481e6723d23!8m2!3d7.1966193!4d79.8793717!16s%2Fg%2F11z1xssj7g?entry=ttu&g_ep=EgoyMDI2MDMxMS4wIKXMDSoASAFQAw%3D%3D" target="_blank" style="text-decoration:none;">
        <div class="card clickable">
            <h2><i class="fas fa-map-marker-alt"></i> Location</h2>
            <div class="info">
                <div>Prime Nature Home & Drive</div>
                <div>Tap to open in Google Maps</div>
            </div>
        </div>
    </a>

    <!-- Facebook Card (clickable) -->
     <a href="https://www.facebook.com/share/1BtWeqTFte/?mibextid=wwXIfr" target="_blank" style="text-decoration:none;">
    <div class="card clickable">
        <h2><i class="fab fa-facebook"></i> Facebook Page</h2>
        <div class="info">
            <div>Tap to visit our page</div>
        </div>
    </div>
    </a>

    <!-- whatapp Card (clickable) -->
    <a href="https://wa.me/00393891393800" target="_blank" style="text-decoration:none;">
    <div class="card clickable">
        <h2><i class="fab fa-whatsapp"></i> Whatsapp</h2>
        <div class="info">
            <div>Tap to contact us on Whatsapp</div>
        </div>
    </div>
    </a>

    <!-- Menu Card with dropdown -->
    <a href="menu.html" style="text-decoration:none;">
    <div class="card clickable">
        <h2><i class="fas fa-utensils"></i> Menu</h2>
        <div class="info">
            <div>Tap to view full menu</div>
        </div>
    </div>
    </a>
 

</div>

<script>
function toggleDropdown() {
    document.getElementById("menuList").classList.toggle("show");
}
</script>

</body>
</html>
